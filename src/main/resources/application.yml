app:
  welcome-message: "Welcome to Spring blog!"
  admin-email: "admin@admin.com"

logging:
  level:
    io.hexlet.blog: DEBUG
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss"

spring:
  profiles:
    active: dev
  output:
    ansi:
      enabled: always

rsa:
  public-key: classpath:certs/public.pem
  private-key: classpath:certs/private.pem
